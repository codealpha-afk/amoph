<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- META_START --> <!-- META_END -->
  <!-- Worker injects: title, description, og:*, twitter:* above -->

  <!-- SEO -->
  <meta name="keywords" content="Ancient Martinist Order Philippines, AMO Philippines, Martinism Philippines, Martinist blog, esoteric writings Philippines">
  <meta name="author" content="Ancient Martinist Order — Philippines">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://amoph.org/blog.html">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/images/favicon.png?v=1">
  <link rel="apple-touch-icon" href="/images/favicon.png?v=1">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/styles.css">

  <style>
    /* ─── BLOG LAYOUT ─── */
    .blog-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 3rem;
      align-items: start;
      margin-top: 3rem;
    }

    /* ─── BLOG CARD (horizontal) ─── */
    .blog-card {
      display: flex;
      flex-direction: row;
      gap: 1.5rem;
      background: rgba(13,12,10,0.95);
      border: 1px solid rgba(201,168,76,0.12);
      padding: 1.5rem;
      margin-bottom: 1px;
      transition: background 0.3s;
      text-decoration: none;
    }

    .blog-card:hover { background: rgba(201,168,76,0.05); }

    .blog-card-thumb-wrap {
      flex-shrink: 0;
      width: 160px;
      height: 110px;
      overflow: hidden;
    }

    .blog-card-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: opacity 0.3s;
    }

    .blog-card:hover .blog-card-thumb { opacity: 1; }

    .blog-card-thumb-placeholder {
      width: 100%;
      height: 100%;
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blog-card-thumb-placeholder svg { opacity: 0.2; }

    .blog-card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .blog-card-date {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .blog-card-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.25rem;
      color: var(--parchment);
      line-height: 1.3;
      text-decoration: none;
    }

    .blog-card-desc {
      font-size: 0.85rem;
      line-height: 1.7;
      color: rgba(245,240,232,0.55);
      margin: 0;
      flex: 1;
    }

    .blog-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.5rem;
    }

    .blog-card-read {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      text-decoration: none;
    }

    /* ─── SHARE ─── */
    .share-wrap { position: relative; }

    .share-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.5);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0;
      transition: color 0.2s;
    }

    .share-btn:hover { color: var(--gold); }

    .share-dropdown {
      display: none;
      position: absolute;
      bottom: 100%;
      right: 0;
      background: #1a1814;
      border: 1px solid rgba(201,168,76,0.2);
      min-width: 160px;
      z-index: 100;
      margin-bottom: 0.5rem;
    }

    .share-dropdown.open { display: block; }

    .share-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.6);
      text-decoration: none;
      background: none;
      border: none;
      border-bottom: 1px solid rgba(201,168,76,0.08);
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: all 0.2s;
    }

    .share-option:last-child { border-bottom: none; }
    .share-option:hover { background: rgba(201,168,76,0.08); color: var(--gold); }
    .share-option svg { width: 13px; height: 13px; flex-shrink: 0; }
    .share-copied { color: #7dc98f !important; }

    /* ─── SIDEBAR ─── */
    .blog-sidebar {
      position: sticky;
      top: 5rem;
    }

    .sidebar-block {
      border: 1px solid rgba(201,168,76,0.15);
      background: rgba(13,12,10,0.95);
      padding: 1.5rem;
    }

    .sidebar-title {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: block;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }

    .sidebar-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-item { border-bottom: 1px solid rgba(201,168,76,0.08); }
    .sidebar-item:last-child { border-bottom: none; }

    .sidebar-link {
      display: block;
      padding: 0.75rem 0;
      text-decoration: none;
      transition: color 0.2s;
    }

    .sidebar-link-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      color: rgba(245,240,232,0.7);
      line-height: 1.3;
      display: block;
      transition: color 0.2s;
    }

    .sidebar-link:hover .sidebar-link-title { color: var(--gold); }

    .sidebar-link-date {
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      color: rgba(201,168,76,0.4);
      text-transform: uppercase;
      display: block;
      margin-top: 0.2rem;
    }

    /* ─── PAGINATION ─── */
    .blog-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(201,168,76,0.12);
    }

    .pagination-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      background: none;
      border: 1px solid rgba(201,168,76,0.3);
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .pagination-btn:hover:not(:disabled) { background: rgba(201,168,76,0.08); }
    .pagination-btn:disabled { opacity: 0.3; cursor: default; }

    .pagination-info {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: rgba(245,240,232,0.4);
      text-transform: uppercase;
    }

    /* ─── STATES ─── */
    .blog-empty {
      text-align: center;
      padding: 5rem 2rem;
      color: rgba(245,240,232,0.4);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
    }

    .blog-loading {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .blog-layout { grid-template-columns: 1fr; }
      .blog-sidebar { position: static; order: -1; }
      .blog-card-thumb-wrap { width: 120px; height: 90px; }
    }

    @media (max-width: 600px) {
      .blog-card { flex-direction: column; }
      .blog-card-thumb-wrap { width: 100%; height: 180px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
 <div id="site-header"></div>

  <div class="page-hero">
    <div class="page-hero-inner">
      <span class="page-eyebrow">Illuminated Writings</span>
      <h2>The <em>Blog</em></h2>
    </div>
  </div>

  <div class="content-area">
    <div class="section-block">
      <span class="section-label">Latest Entries</span>
      <div class="gold-rule"></div>

      <div class="blog-layout">

        <!-- MAIN POSTS -->
        <div class="blog-main">
          <div id="blogGrid" class="blog-loading">Loading posts…</div>

          <!-- PAGINATION -->
          <div class="blog-pagination" id="blogPagination" style="display:none;">
            <button class="pagination-btn" id="btnPrev" onclick="changePage(-1)">← Previous</button>
            <span class="pagination-info" id="pageInfo"></span>
            <button class="pagination-btn" id="btnNext" onclick="changePage(1)">Next →</button>
          </div>
        </div>

        <!-- SIDEBAR -->
        <aside class="blog-sidebar">
          <div class="sidebar-block">
            <span class="sidebar-title">All Posts</span>
            <ul class="sidebar-list" id="sidebarList">
              <li style="color:rgba(245,240,232,0.3);font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.2em;">Loading…</li>
            </ul>
          </div>
        </aside>

      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/script.js"></script>


  <script>
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.share-wrap')) {
        document.querySelectorAll('.share-dropdown').forEach(d => d.classList.remove('open'));
      }
    });

    const REPO        = 'codealpha-afk/amoph';
    const BRANCH      = 'main';
    const POSTS_PATH  = '_posts';
    const API         = `https://api.github.com/repos/${REPO}/contents/${POSTS_PATH}?ref=${BRANCH}`;
    const BASE_URL    = 'https://amoph.org';
    const POSTS_PER_PAGE = 5;

    let allPosts   = [];
    let currentPage = 1;

    function postUrl(filename) {
      return `${BASE_URL}/blog-post.html?post=${encodeURIComponent(filename)}`;
    }

    function toggleShare(id, e) {
      e.preventDefault();
      e.stopPropagation();
      const dd = document.getElementById(id);
      const wasOpen = dd.classList.contains('open');
      document.querySelectorAll('.share-dropdown').forEach(d => d.classList.remove('open'));
      if (!wasOpen) dd.classList.add('open');
    }

    function copyLink(url, btnId) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById(btnId);
        btn.classList.add('share-copied');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove('share-copied');
          btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> Copy Link`;
        }, 2000);
      });
    }

    function nativeShare(url, title) {
      if (navigator.share) {
        navigator.share({ title, url, text: title });
      } else {
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
      }
    }

    function buildCard(p, i) {
      const url      = postUrl(p.filename);
      const enc      = encodeURIComponent(url);
      const encTitle = encodeURIComponent(p.title || 'AMO Philippines Blog');
      const ddId     = `sd-${i}`;
      const copyBtnId = `copy-${i}`;

      const thumbHtml = p.thumbnail
        ? `<div class="blog-card-thumb-wrap"><img class="blog-card-thumb" src="${p.thumbnail}" alt="${p.title || ''}"></div>`
        : `<div class="blog-card-thumb-wrap"><div class="blog-card-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="32" height="32"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div></div>`;

      return `
        <a class="blog-card" href="${url}">
          ${thumbHtml}
          <div class="blog-card-content">
            <span class="blog-card-date">${formatDate(p.date)}</span>
            <span class="blog-card-title">${p.title || 'Untitled'}</span>
            <p class="blog-card-desc">${p.description || ''}</p>
            <div class="blog-card-footer">
              <span class="blog-card-read">Read More →</span>
              <div class="share-wrap">
                <button class="share-btn" onclick="toggleShare('${ddId}', event)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                  Share
                </button>
                <div class="share-dropdown" id="${ddId}">
                  <button class="share-option" id="${copyBtnId}" onclick="copyLink('${url}', '${copyBtnId}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
                    Copy Link
                  </button>
                  <a class="share-option" href="https://www.facebook.com/sharer/sharer.php?u=${enc}" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
                    Facebook
                  </a>
                  <a class="share-option" href="https://twitter.com/intent/tweet?url=${enc}&text=${encTitle}" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    Twitter / X
                  </a>
                  <a class="share-option" href="https://api.whatsapp.com/send?text=${encTitle}%20${enc}" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    WhatsApp
                  </a>
                  <button class="share-option" onclick="nativeShare('${url}', '${(p.title || '').replace(/'/g, "\\'")}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    More Options
                  </button>
                </div>
              </div>
            </div>
          </div>
        </a>
      `;
    }

    function renderPage() {
      const grid       = document.getElementById('blogGrid');
      const pagination = document.getElementById('blogPagination');
      const pageInfo   = document.getElementById('pageInfo');
      const btnPrev    = document.getElementById('btnPrev');
      const btnNext    = document.getElementById('btnNext');

      const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
      const start      = (currentPage - 1) * POSTS_PER_PAGE;
      const pagePosts  = allPosts.slice(start, start + POSTS_PER_PAGE);

      grid.className  = '';
      grid.innerHTML  = pagePosts.map((p, i) => buildCard(p, start + i)).join('');

      if (totalPages > 1) {
        pagination.style.display = 'flex';
        pageInfo.textContent     = `Page ${currentPage} of ${totalPages}`;
        btnPrev.disabled         = currentPage === 1;
        btnNext.disabled         = currentPage === totalPages;
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changePage(dir) {
      currentPage += dir;
      renderPage();
    }

    function buildSidebar(posts) {
      const list = document.getElementById('sidebarList');
      if (posts.length === 0) {
        list.innerHTML = '<li style="color:rgba(245,240,232,0.3);font-family:Cinzel,serif;font-size:0.6rem;letter-spacing:0.2em;">No posts yet</li>';
        return;
      }
      list.innerHTML = posts.map(p => `
        <li class="sidebar-item">
          <a class="sidebar-link" href="/blog-post.html?post=${encodeURIComponent(p.filename)}">
            <span class="sidebar-link-title">${p.title || 'Untitled'}</span>
            <span class="sidebar-link-date">${formatDate(p.date)}</span>
          </a>
        </li>
      `).join('');
    }

    async function loadPosts() {
      const grid = document.getElementById('blogGrid');
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error('Failed to fetch');
        const files = await res.json();

        const mdFiles = files
          .filter(f => f.name.endsWith('.md'))
          .sort((a, b) => b.name.localeCompare(a.name));

        if (mdFiles.length === 0) {
          grid.className = '';
          grid.innerHTML = '<div class="blog-empty">No posts have been written yet.</div>';
          buildSidebar([]);
          return;
        }

        const posts = await Promise.all(mdFiles.map(async f => {
          const r    = await fetch(f.download_url);
          const text = await r.text();
          return parseFrontmatter(text, f.name);
        }));

        allPosts = posts.filter(p => p.draft !== 'true');

        if (allPosts.length === 0) {
          grid.className = '';
          grid.innerHTML = '<div class="blog-empty">No published posts yet.</div>';
          buildSidebar([]);
          return;
        }

        buildSidebar(allPosts);
        renderPage();

      } catch (e) {
        grid.className = '';
        grid.innerHTML = '<div class="blog-empty">Unable to load posts at this time.</div>';
      }
    }

    function parseFrontmatter(text, filename) {
      const fm = {};
      fm.filename = filename;
      const match = text.match(/^---\n([\s\S]*?)\n---/);
      if (match) {
        match[1].split('\n').forEach(line => {
          const [key, ...val] = line.split(':');
          if (key) fm[key.trim()] = val.join(':').trim().replace(/^["']|["']$/g, '');
        });
      }
      return fm;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      } catch { return dateStr; }
    }

    loadPosts();
  </script>
</body>
</html>
