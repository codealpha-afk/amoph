<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- META_START --> <!-- META_END -->
  <!-- Worker injects: title, description, og:*, twitter:* above -->
  <!-- Note: blog post og: tags are also overridden client-side below
       for browser tab title accuracy once the post loads -->

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/images/favicon.ico">
  <link rel="apple-touch-icon" href="/images/favicon.ico">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/styles.css">

  <style>
    /* ─── POST HERO ─── */
    .post-hero {
      min-height: 50vh;
      display: flex;
      align-items: flex-end;
      padding: 8rem 4rem 4rem;
      border-bottom: 1px solid rgba(201,168,76,0.2);
      position: relative;
      overflow: hidden;
    }

    .post-hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(201,168,76,0.06), rgba(13,12,10,0.95));
      z-index: 0;
    }

    .post-hero-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.15;
      z-index: 0;
    }

    .post-hero-inner {
      position: relative;
      z-index: 1;
      max-width: 760px;
    }

    .post-back {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      margin-bottom: 1.5rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .post-back:hover { opacity: 1; }

    .post-date {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      color: rgba(201,168,76,0.6);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .post-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--parchment);
      line-height: 1.2;
      margin: 0 0 1rem;
    }

    .post-desc {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(245,240,232,0.6);
      margin: 0 0 1.5rem;
      line-height: 1.6;
    }

    /* ─── SHARE BAR (hero) ─── */
    .post-share-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .post-share-label {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.5);
      margin-right: 0.25rem;
    }

    .post-share-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.5);
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.15);
      padding: 0.45rem 0.85rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }

    .post-share-btn:hover { background: rgba(201,168,76,0.12); color: var(--gold); border-color: rgba(201,168,76,0.3); }
    .post-share-btn.copied { color: #7dc98f; border-color: #7dc98f; }
    .post-share-btn svg { width: 11px; height: 11px; }

    /* ─── POST LAYOUT ─── */
    .post-layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 3rem;
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    /* ─── POST BODY ─── */
    .post-body {
      min-width: 0;
      font-family: 'Libre Baskerville', serif;
      font-size: 1rem;
      line-height: 1.9;
      color: rgba(245,240,232,0.8);
    }

    .post-body h1, .post-body h2, .post-body h3 {
      font-family: 'Cinzel', serif;
      color: var(--parchment);
      font-weight: 400;
      margin: 2.5rem 0 1rem;
      letter-spacing: 0.05em;
    }

    .post-body h1 { font-size: 1.6rem; }
    .post-body h2 { font-size: 1.25rem; }
    .post-body h3 { font-size: 1rem; }

    .post-body p { margin: 0 0 1.5rem; }
    .post-body a { color: var(--gold); text-decoration: underline; text-underline-offset: 3px; }

    .post-body blockquote {
      border-left: 2px solid var(--gold);
      margin: 2rem 0;
      padding: 1.25rem 1.5rem;
      background: rgba(201,168,76,0.04);
    }

    .post-body blockquote p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--parchment);
      margin: 0;
    }

    .post-body img { width: 100%; height: auto; margin: 2rem 0; opacity: 0.9; }

    .post-body ul, .post-body ol {
      margin: 1rem 0 1.5rem 1.5rem;
      color: rgba(245,240,232,0.8);
      line-height: 1.9;
    }

    .post-body hr { border: none; border-top: 1px solid rgba(201,168,76,0.2); margin: 3rem 0; }

    .post-divider { width: 60px; height: 1px; background: var(--gold); margin: 0 auto 4rem; }

    /* ─── BOTTOM SHARE ─── */
    .post-share-section {
      border-top: 1px solid rgba(201,168,76,0.2);
      padding-top: 3rem;
      margin-top: 3rem;
    }

    .post-share-section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: block;
    }

    .post-share-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    /* ─── POST PAGINATION ─── */
    .post-pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(201,168,76,0.15);
      gap: 1rem;
    }

    .post-nav-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      background: none;
      border: 1px solid rgba(201,168,76,0.3);
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      max-width: 45%;
    }

    .post-nav-btn:hover { background: rgba(201,168,76,0.08); }
    .post-nav-btn.disabled { opacity: 0.3; pointer-events: none; }
    .post-nav-btn.next { text-align: right; margin-left: auto; }

    .post-nav-label { font-size: 0.52rem; opacity: 0.6; }
    .post-nav-title { font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; font-weight: 300; }

    /* ─── SIDEBAR ─── */
    .post-sidebar { position: sticky; top: 5rem; }

    .sidebar-block {
      border: 1px solid rgba(201,168,76,0.15);
      background: rgba(13,12,10,0.95);
      padding: 1.5rem;
    }

    .sidebar-title {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: block;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }

    .sidebar-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
    .sidebar-item { border-bottom: 1px solid rgba(201,168,76,0.08); }
    .sidebar-item:last-child { border-bottom: none; }

    .sidebar-link { display: block; padding: 0.75rem 0; text-decoration: none; transition: color 0.2s; }

    .sidebar-link-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      color: rgba(245,240,232,0.7);
      line-height: 1.3;
      display: block;
      transition: color 0.2s;
    }

    .sidebar-link:hover .sidebar-link-title,
    .sidebar-link.active .sidebar-link-title { color: var(--gold); }

    .sidebar-link-date {
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 0.2em;
      color: rgba(201,168,76,0.4);
      text-transform: uppercase;
      display: block;
      margin-top: 0.2rem;
    }

    /* ─── STATES ─── */
    .post-loading {
      text-align: center;
      padding: 8rem 2rem;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .post-error {
      text-align: center;
      padding: 8rem 2rem;
      color: rgba(245,240,232,0.4);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .post-hero { padding: 7rem 1.5rem 3rem; }
      .post-layout { grid-template-columns: 1fr; padding: 3rem 1.5rem; }
      .post-sidebar { position: static; }
    }

    @media (max-width: 600px) {
      .post-hero { padding: 6rem 1.25rem 2.5rem; }
      .post-pagination { flex-direction: column; }
      .post-nav-btn { max-width: 100%; }
      .post-nav-btn.next { margin-left: 0; text-align: left; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
 <div id="site-header"></div>

  <!-- HERO -->
  <div class="post-hero" id="postHero">
    <div class="post-hero-bg"></div>
    <div class="post-hero-inner" id="postHeroInner">
      <div class="post-loading">Loading…</div>
    </div>
  </div>

  <!-- POST LAYOUT: body + sidebar -->
  <div class="post-layout">

    <!-- MAIN CONTENT -->
    <div class="post-body" id="postBody"></div>

    <!-- SIDEBAR -->
    <aside class="post-sidebar">
      <div class="sidebar-block">
        <span class="sidebar-title">All Posts</span>
        <ul class="sidebar-list" id="sidebarList">
          <li style="color:rgba(245,240,232,0.3);font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.2em;">Loading…</li>
        </ul>
      </div>
    </aside>

  </div>

  <!-- FOOTER -->
  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/script.js"></script>

  <script>
    const REPO       = 'codealpha-afk/amoph';
    const BRANCH     = 'main';
    const POSTS_PATH = '_posts';
    const BASE_URL   = 'https://amoph.org';

    let allPosts       = [];
    let currentFilename = '';

    function postUrl(filename) {
      return `${BASE_URL}/blog-post.html?post=${encodeURIComponent(filename)}`;
    }

    function buildShareButtons(url, title, containerId) {
      const enc      = encodeURIComponent(url);
      const encTitle = encodeURIComponent(title);
      return `
        <button class="post-share-btn" id="${containerId}-copy" onclick="copyPostLink('${url}', '${containerId}-copy')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
          Copy Link
        </button>
        <a class="post-share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${enc}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
          Facebook
        </a>
        <a class="post-share-btn" href="https://twitter.com/intent/tweet?url=${enc}&text=${encTitle}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Twitter / X
        </a>
        <a class="post-share-btn" href="https://api.whatsapp.com/send?text=${encTitle}%20${enc}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp
        </a>
        <button class="post-share-btn" onclick="nativeShare('${url}', '${title.replace(/'/g, "\\'")}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          More
        </button>
      `;
    }

    function copyPostLink(url, btnId) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById(btnId);
        btn.classList.add('copied');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="11" height="11"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> Copy Link`;
        }, 2000);
      });
    }

    function nativeShare(url, title) {
      if (navigator.share) {
        navigator.share({ title, url, text: title });
      } else {
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
      }
    }

    function buildSidebar(posts, currentFile) {
      const list = document.getElementById('sidebarList');
      if (!posts.length) {
        list.innerHTML = '<li style="color:rgba(245,240,232,0.3);font-family:\'Cinzel\',serif;font-size:0.6rem;letter-spacing:0.2em;">No posts yet</li>';
        return;
      }
      list.innerHTML = posts.map(p => `
        <li class="sidebar-item">
          <a class="sidebar-link ${p.filename === currentFile ? 'active' : ''}" href="/blog-post.html?post=${encodeURIComponent(p.filename)}">
            <span class="sidebar-link-title">${p.title || 'Untitled'}</span>
            <span class="sidebar-link-date">${formatDate(p.date)}</span>
          </a>
        </li>
      `).join('');
    }

    function buildPagination(posts, currentFile) {
      const idx  = posts.findIndex(p => p.filename === currentFile);
      const prev = posts[idx + 1] || null;
      const next = posts[idx - 1] || null;

      return `
        <div class="post-pagination">
          ${prev
            ? `<a class="post-nav-btn prev" href="/blog-post.html?post=${encodeURIComponent(prev.filename)}">
                <span class="post-nav-label">← Previous</span>
                <span class="post-nav-title">${prev.title || 'Untitled'}</span>
               </a>`
            : `<span class="post-nav-btn disabled"><span class="post-nav-label">← Previous</span><span class="post-nav-title">No older posts</span></span>`}
          ${next
            ? `<a class="post-nav-btn next" href="/blog-post.html?post=${encodeURIComponent(next.filename)}">
                <span class="post-nav-label">Next →</span>
                <span class="post-nav-title">${next.title || 'Untitled'}</span>
               </a>`
            : `<span class="post-nav-btn next disabled"><span class="post-nav-label">Next →</span><span class="post-nav-title">No newer posts</span></span>`}
        </div>
      `;
    }

    async function loadAllPosts() {
      const API = `https://api.github.com/repos/${REPO}/contents/${POSTS_PATH}?ref=${BRANCH}`;
      try {
        const res     = await fetch(API);
        if (!res.ok) return [];
        const files   = await res.json();
        const mdFiles = files
          .filter(f => f.name.endsWith('.md'))
          .sort((a, b) => b.name.localeCompare(a.name));

        const posts = await Promise.all(mdFiles.map(async f => {
          const r    = await fetch(f.download_url);
          const text = await r.text();
          const { frontmatter } = parseFrontmatter(text, f.name);
          return frontmatter;
        }));

        return posts.filter(p => p.draft !== 'true');
      } catch { return []; }
    }

    async function loadPost() {
      const params    = new URLSearchParams(window.location.search);
      const filename  = params.get('post');
      const heroInner = document.getElementById('postHeroInner');
      const postBody  = document.getElementById('postBody');
      const postHero  = document.getElementById('postHero');

      if (!filename) {
        heroInner.innerHTML = '<div class="post-error">Post not found.</div>';
        return;
      }

      currentFilename = filename;
      const pageUrl = postUrl(filename);

      const [postText, posts] = await Promise.all([
        fetch(`https://raw.githubusercontent.com/${REPO}/${BRANCH}/${POSTS_PATH}/${filename}`)
          .then(r => { if (!r.ok) throw new Error('Not found'); return r.text(); }),
        loadAllPosts()
      ]);

      allPosts = posts;

      try {
        const { frontmatter, body } = parseFrontmatter(postText, filename);

        // Update browser tab title client-side
        document.title = `${frontmatter.title || 'Post'} — AMO · Philippines`;

        if (frontmatter.thumbnail) {
          const img = document.createElement('img');
          img.src       = frontmatter.thumbnail;
          img.alt       = frontmatter.title || '';
          img.className = 'post-hero-thumb';
          postHero.insertBefore(img, postHero.firstChild);
        }

        heroInner.innerHTML = `
          <a class="post-back" href="/blog.html">← Back to Blog</a>
          <span class="post-date">${formatDate(frontmatter.date)}</span>
          <h1 class="post-title">${frontmatter.title || 'Untitled'}</h1>
          ${frontmatter.description ? `<p class="post-desc">${frontmatter.description}</p>` : ''}
          <div class="post-share-bar">
            <span class="post-share-label">Share</span>
            ${buildShareButtons(pageUrl, frontmatter.title || 'AMO Philippines', 'hero')}
          </div>
        `;

        postBody.innerHTML = `
          <div class="post-divider"></div>
          ${marked.parse(body)}
          <div class="post-share-section">
            <span class="post-share-section-title">Share This Article</span>
            <div class="post-share-buttons">
              ${buildShareButtons(pageUrl, frontmatter.title || 'AMO Philippines', 'bottom')}
            </div>
          </div>
          ${buildPagination(allPosts, filename)}
        `;

        buildSidebar(allPosts, filename);

      } catch (e) {
        heroInner.innerHTML = `
          <a class="post-back" href="/blog.html">← Back to Blog</a>
          <div class="post-error">This post could not be found.</div>
        `;
        buildSidebar(allPosts, filename);
      }
    }

    function parseFrontmatter(text, filename) {
      const fm = { filename };
      let body = text;
      const match = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)/);
      if (match) {
        match[1].split('\n').forEach(line => {
          const colonIdx = line.indexOf(':');
          if (colonIdx > -1) {
            const key = line.slice(0, colonIdx).trim();
            const val = line.slice(colonIdx + 1).trim().replace(/^["']|["']$/g, '');
            if (key) fm[key] = val;
          }
        });
        body = match[2] || '';
      }
      return { frontmatter: fm, body };
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      } catch { return dateStr; }
    }

    loadPost();
  </script>
</body>
</html>
