collections:
  - name: posts
    label: Blog Posts
    path: src/posts
    fields:
      - name: title
        label: Title
        type: string
      - name: excerpt
        label: Excerpt
        type: string
      - name: description
        label: Meta Description
        type: string
      - name: date
        label: Date
        type: date
      - name: category
        label: Category
        type: select
        options:
          - Doctrine
          - Initiation
          - History
          - Practice
          - Philippines
          - Western Esotericism
      - name: tags
        label: Tags
        type: string
        default: posts
      - name: layout
        label: Layout
        type: string
        default: layouts/post.njk