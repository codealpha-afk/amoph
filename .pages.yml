media:
  input: src/images/blog
  output: /images/blog

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: src/posts
    filename: "{fields.slug}.md"
    view:
      fields: [title, date, category]
    fields:
      - name: title
        label: Title
        type: string
      - name: slug
        label: URL Slug
        type: string
      - name: date
        label: Date
        type: date
      - name: category
        label: Category
        type: select
        options:
          values:
            - label: Doctrine
              value: Doctrine
            - label: Initiation
              value: Initiation
            - label: History
              value: History
            - label: Practice
              value: Practice
            - label: Philippines
              value: Philippines
            - label: Western Esotericism
              value: Western Esotericism
      - name: description
        label: Meta Description
        type: string
      - name: excerpt
        label: Excerpt
        type: string
      - name: body
        label: Content
        type: rich-text