media:
  input: src/images/blog
  output: /images/blog

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: src/posts
    filename: "{fields.slug}.md"
    fields:
      - name: title
        label: Title
        type: string
      - name: slug
        label: URL Slug
        type: string
      - name: date
        label: Date
        type: date
      - name: category
        label: Category
        type: select
        choices:
          - Doctrine
          - Initiation
          - History
          - Practice
          - Philippines
          - Western Esotericism
      - name: description
        label: Meta Description
        type: string
      - name: excerpt
        label: Excerpt
        type: string
      - name: body
        label: Content
        type: rich-text